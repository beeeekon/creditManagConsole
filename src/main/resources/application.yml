spring:
  main:
    allow-bean-definition-overriding: true # от конфликта имен бинов загружено две версии одной беблиотеки
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://${DB_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}

  liquibase:
    change-log: db/changelog/main-changelog.yml

# ===== SWAGGER/OPENAPI =====
springdoc:
  api-docs:
    enabled: true          # Включить генерацию документации
    path: /api-docs        # URL для JSON документации
  swagger-ui:
    enabled: true          # Включить Swagger UI
    path: /swagger-ui.html # URL для Swagger UI
    tags-sorter: alpha     # Сортировка тегов по алфавиту
    operations-sorter: method # Сортировка операций по HTTP методу