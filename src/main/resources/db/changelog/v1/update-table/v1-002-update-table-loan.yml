databaseChangeLog:
  - changeSet:
      id: v1-upd-loan-1784062257
      author: barkalovaev

      preconditions:
        - onFail: MARK_RAN # если условие не выполнилось, пропустить изменения и записать лог как выполненный
        - and:
            - tableExists:
                tableName: loan
            - not:
                columnExists:
                  tableName: loan
                  columnName: interest_rate


      changes:
        - addColumn:
            tableName: loan
            columns:
              - column:
                  name: interest_rate
                  type: numeric(5,2)
                  constraints:
                    nullable: false
                  defaultValue: 0.00
