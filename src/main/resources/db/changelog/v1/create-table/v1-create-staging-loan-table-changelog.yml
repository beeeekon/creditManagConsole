databaseChangeLog:
  - changeSet:
      id: v1-cre-staging-loan
      author: barkalovaev
      preconditions:
        - onFail: MARK_RAN
        - not:
            tableExists:
              tableName: staging_loan
      changes:
        # временная таблица для вставки данных в таблицу loan
        # в такие таблицы данные загружаются без всяких ограничений, это как бы черновик
        # при частой вставке данных через csv можно добавить еще колонку load_batch_id
        # обычно его настраивают на генерацию номера партии, например дата загрузки
        - createTable:
            tableName: staging_loan
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
              - column:
                  name: passport_number
                  type: varchar(20)
              - column:
                  name: currency
                  type: varchar(5)
              - column:
                  name: amount
                  type: numeric(17,2)
              - column:
                  name: term_months
                  type: int
              - column:
                  name: monthly_payment
                  type: numeric(17,2)
              - column:
                  name: loan_status
                  type: varchar(10)
